<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0c10">
<title>Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0c10;
  --panel:#12151b;
  --border:#1f242c;
  --primary:#3b82f6;
  --primary-d:#2563eb;
  --primary-l:#60a5fa;
  --text:#e8eaed;
  --muted:#8a93a0;
  --red:#ef4444;
  --green:#10b981;
}
html,body{height:100%}
body{
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
/* Animated gradient background */
.bg-anim{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(59,130,246,.18) 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(139,92,246,.14) 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(16,185,129,.08) 0%, transparent 50%),
    var(--bg);
  animation:bgshift 18s ease-in-out infinite alternate;
}
@keyframes bgshift{
  0%{background-position:0% 0%,100% 100%,50% 50%}
  100%{background-position:30% 20%,70% 60%,40% 30%}
}
/* Floating particles */
.particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.p{position:absolute;width:4px;height:4px;border-radius:50%;background:rgba(59,130,246,.3);animation:float 14s linear infinite}
@keyframes float{
  0%{transform:translateY(110vh) scale(0);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateY(-10vh) scale(1.2);opacity:0}
}
.wrap{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{
  background:rgba(18,21,27,.85);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:20px;
  padding:44px 36px;text-align:center;width:100%;max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03) inset;
  animation:cardin .7s cubic-bezier(.2,.8,.2,1);
}
@keyframes cardin{
  0%{opacity:0;transform:translateY(24px) scale(.95)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
.logo{
  width:68px;height:68px;border-radius:18px;
  background:linear-gradient(135deg,var(--primary) 0%,#1e40af 100%);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:30px;color:#fff;
  margin:0 auto 24px;letter-spacing:-.04em;
  box-shadow:0 8px 28px rgba(59,130,246,.45),0 0 0 1px rgba(255,255,255,.1) inset;
  animation:logopulse 3s ease-in-out infinite;
}
@keyframes logopulse{
  0%,100%{box-shadow:0 8px 28px rgba(59,130,246,.45),0 0 0 1px rgba(255,255,255,.1) inset;transform:scale(1)}
  50%{box-shadow:0 8px 36px rgba(59,130,246,.7),0 0 0 1px rgba(255,255,255,.15) inset;transform:scale(1.05)}
}
h1{font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:6px;animation:fadein .8s .2s both}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sub{color:var(--muted);font-size:14px;margin-bottom:28px;animation:fadein .8s .35s both}
form{animation:fadein .8s .5s both}
.input-wrap{position:relative;margin-bottom:6px}
.input-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);width:18px;height:18px;transition:.2s}
.input{
  width:100%;padding:14px 14px 14px 44px;background:rgba(24,28,35,.8);
  border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-size:15px;outline:none;
  transition:.2s;font-family:inherit;
}
.input:focus{border-color:var(--primary);background:rgba(29,34,42,1);box-shadow:0 0 0 4px rgba(59,130,246,.15)}
.input-wrap:focus-within svg{color:var(--primary-l)}
.err{color:var(--red);font-size:12.5px;min-height:20px;margin-bottom:8px;transition:.2s;text-align:left;padding:0 4px}
.btn{
  width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;
  border:none;border-radius:12px;font-size:15px;font-weight:600;
  cursor:pointer;transition:.2s;font-family:inherit;
  position:relative;overflow:hidden;
  box-shadow:0 4px 14px rgba(59,130,246,.3);
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(59,130,246,.45)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.6;cursor:wait}
.btn::after{
  content:"";position:absolute;top:50%;left:50%;width:0;height:0;
  background:rgba(255,255,255,.3);border-radius:50%;transform:translate(-50%,-50%);
  transition:width .5s,height .5s;
}
.btn:active::after{width:320px;height:320px}
.hint{margin-top:20px;font-size:12px;color:var(--muted);animation:fadein .8s .65s both}
.spinner-sm{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-anim"></div>
<div class="particles" id="particles"></div>
<div class="wrap">
  <div class="card">
    <div class="logo">M</div>
    <h1>Manager</h1>
    <p class="sub">Enter password to continue</p>
    <form id="login-form">
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="login-pw" class="input" placeholder="Password" autocomplete="current-password" autofocus>
      </div>
      <div class="err" id="login-err"></div>
      <button type="submit" class="btn" id="login-btn">Unlock</button>
    </form>
    <div class="hint">Default password: <code style="font-family:'JetBrains Mono',monospace;color:#60a5fa">manager123</code> · Change it in Settings</div>
  </div>
</div>
<script>
// particles
(function(){
  const p = document.getElementById('particles');
  for(let i=0;i<28;i++){
    const d = document.createElement('div');
    d.className = 'p';
    d.style.left = Math.random()*100 + '%';
    d.style.width = d.style.height = (2 + Math.random()*5) + 'px';
    d.style.animationDelay = (Math.random()*14) + 's';
    d.style.animationDuration = (10 + Math.random()*10) + 's';
    d.style.background = `rgba(59,130,246,${0.12 + Math.random()*0.25})`;
    p.appendChild(d);
  }
})();

// check if password is required — if not, redirect to dashboard
fetch('/api/me').then(r=>r.json()).then(d=>{
  if(d.no_password){ location.href = '/'; }
  else { document.querySelector('.sub').textContent = 'Enter your password to continue'; }
}).catch(()=>{});

const form = document.getElementById('login-form');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-err');
  const btn = document.getElementById('login-btn');
  errEl.textContent = '';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-sm"></span>Unlocking…';
  try {
    const r = await fetch('/api/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    const d = await r.json();
    if (r.ok) { location.href = '/'; }
    else { errEl.textContent = d.error || 'Wrong password'; }
  } catch (ex) { errEl.textContent = 'Network error'; }
  btn.disabled = false;
  btn.textContent = 'Unlock';
});
</script>
</body>
</html>
